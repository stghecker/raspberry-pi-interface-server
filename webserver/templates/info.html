<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Info</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark">
<div class="container">
    <h1>System Information</h1>
    <p><strong>Operating System:</strong> {{ os_info }}</p>

    <h3>CPU Usage</h3>
    <div class="bar">
        <div id="cpu-bar" class="bar-fill" style="width: {{ cpu }}%"></div>
    </div>
    <p id="cpu-text">{{ cpu }}%</p>

    <h3>RAM Usage</h3>
    <div class="bar">
        <div id="ram-bar" class="bar-fill ram" style="width: {{ ram }}%"></div>
    </div>
    <p id="ram-text">{{ ram }}% ({{ ram_used }} / {{ ram_total }} GB)</p>

    <a href="/" class="btn">Back</a>
</div>

<script>
    async function updateInfo() {
        try {
            const res = await fetch('/info_data');
            const data = await res.json();
            const cpu = data.cpu;
            const ram = data.ram;

            document.getElementById('cpu-bar').style.width = cpu + '%';
            document.getElementById('cpu-text').innerText = cpu + '%';

            document.getElementById('ram-bar').style.width = ram + '%';
            const ramText = document.getElementById('ram-text').innerText;
            const gbPart = ramText.substring(ramText.indexOf('('));
            document.getElementById('ram-text').innerText = ram + '% ' + gbPart;
        } catch (e) {
            console.log(e);
        }
    }

    setInterval(updateInfo, 2000);
</script>
</body>
</html>
