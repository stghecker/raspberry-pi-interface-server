<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Create User</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post">

    <label>Username</label>
    <input type="text" name="username" required>

    <label>Password</label>
    <input type="text" name="password">

    <label>Base Directory</label>
    <input type="text" name="base_dir" value="/">

    <label><input type="checkbox" name="is_admin"> Admin</label><br>
    <label><input type="checkbox" name="can_terminal"> Can use Terminal</label><br>
    <label><input type="checkbox" name="can_restart"> Can Restart Server</label><br>
    <label><input type="checkbox" name="can_info"> Can See Info</label><br>

    <button class="btn">Create</button>
</form>

<a class="btn-secondary" href="/admin">Back</a>

</body>
</html>
